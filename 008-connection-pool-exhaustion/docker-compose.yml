services:
  db:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=10"]
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb

  app:
    build: .
    command: ["python", "/app/app.py"]
    ports:
      - "8080:8080"
    depends_on:
      - db

  batch:
    build: .
    command: ["sleep", "infinity"]
    depends_on:
      - db
