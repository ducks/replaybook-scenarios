name: test scenarios

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install replaybook
        run: cargo install replaybook --version 20260704.0.0 --locked

      - name: Test every scenario
        run: |
          set -e
          failed=0
          for dir in [0-9]*/; do
            id="${dir%/}"
            echo "::group::$id"
            if ! replaybook test "$id" --scenarios-dir "$GITHUB_WORKSPACE"; then
              echo "::error::$id failed"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit "$failed"
